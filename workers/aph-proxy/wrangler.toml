name = "aph-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace for caching APH RSS responses (5-minute TTL).
[[kv_namespaces]]
binding = "CACHE"
id = "7e87caca7a354030a1da85ebbbbe518f"

# D1 database for persistent archive of every RSS item observed and connector
# health checks. Create the database with:
#   wrangler d1 create parliament-pulse-archive
# then replace database_id below with the printed value, then apply migrations:
#   wrangler d1 migrations apply parliament-pulse-archive --remote
[[d1_databases]]
binding = "ARCHIVE"
database_name = "parliament-pulse-archive"
database_id = "REPLACE_WITH_D1_ID_AFTER_CREATE"
migrations_dir = "migrations"

[vars]
# Comma-separated list of origins allowed to call this Worker.
ALLOWED_ORIGINS = "http://127.0.0.1:5173,http://localhost:5173,https://parliament-pulse.pages.dev"

[observability]
enabled = true

# Cron triggers.
#   */30 * * * *   poll APH RSS every 30 minutes and upsert into D1
#   0 0 */14 * *   re-verify the 12 APH connector URLs every 14 days
#   0 19 * * *     daily 05:00 AEST: Hansard QON ingest + digest delivery
[triggers]
crons = ["*/30 * * * *", "0 0 */14 * *", "0 19 * * *"]

# Optional secret for digest delivery via SendGrid. Set with:
#   wrangler secret put SENDGRID_API_KEY
# When unset, sendDailyDigest is a no-op (subscribers still recorded in D1).
