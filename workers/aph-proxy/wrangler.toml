name = "aph-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace for caching APH RSS responses (5-minute TTL).
[[kv_namespaces]]
binding = "CACHE"
id = "7e87caca7a354030a1da85ebbbbe518f"

# D1 database for persistent archive of every RSS item observed and connector
# health checks. Create the database with:
#   wrangler d1 create parliament-pulse-archive
# then replace database_id below with the printed value, then apply migrations:
#   wrangler d1 migrations apply parliament-pulse-archive --remote
[[d1_databases]]
binding = "ARCHIVE"
database_name = "parliament-pulse-archive"
database_id = "2147ccbf-c032-4513-8e5b-6cd131fb6f10"
migrations_dir = "migrations"

[vars]
# Comma-separated list of origins allowed to call this Worker (CORS).
# Add your custom domain here if you add one, e.g.:
#   "http://127.0.0.1:5173,http://localhost:5173,https://parliament-pulse.pages.dev,https://pulse.prometheuspolicylab.com"
ALLOWED_ORIGINS = "http://127.0.0.1:5173,http://localhost:5173,https://parliament-pulse.pages.dev,https://pulse.prometheuspolicylab.com"

# Access gate for /archive endpoint.
# Set to "true" to require a Cloudflare Access JWT header.
# Activate via: Cloudflare dashboard → Zero Trust → Access → Applications → add this Worker.
# Leave "false" for a public-access policy intelligence tool.
REQUIRE_ACCESS = "false"
DIGEST_FROM_EMAIL = "noreply@prometheuspolicylab.com"

[observability]
enabled = true

# Cron triggers.
#   */30 * * * *   poll APH RSS every 30 minutes and upsert into D1; re-derive member roster
#   0 0 */14 * *   re-verify the 12 APH connector URLs every 14 days
#   0 19 * * *     daily 05:00 AEST: Hansard QON ingest + digest delivery
[triggers]
crons = ["*/30 * * * *", "0 0 */14 * *", "0 19 * * *"]

# ---- Secrets (set with `wrangler secret put <NAME>`) -----------------------
#
# SENDGRID_API_KEY   — activates email digest delivery (optional)
#                      wrangler secret put SENDGRID_API_KEY
#
# DIGEST_FROM_EMAIL  — sender address for digest emails
#                      defaults to noreply@prometheuspolicylab.com (set below)
#                      must be a verified SendGrid sender domain
#                      override with: wrangler secret put DIGEST_FROM_EMAIL
#
# Rate limits (no secret needed — built into Worker code):
#   /archive  120 req/min per IP
#   /bills     60 req/min per IP
#   /qons      30 req/min per IP
#   /members   30 req/min per IP
