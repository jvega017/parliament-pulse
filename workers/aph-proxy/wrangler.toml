name = "aph-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# KV namespace for caching APH RSS responses (5-minute TTL).
# Replace `id` with the value returned by: wrangler kv namespace create CACHE
[[kv_namespaces]]
binding = "CACHE"
id = "7e87caca7a354030a1da85ebbbbe518f"

[vars]
# Comma-separated list of origins allowed to call this Worker.
# Updated to include the Cloudflare Pages deployment URL after first deploy.
ALLOWED_ORIGINS = "http://127.0.0.1:5173,http://localhost:5173,https://parliament-pulse.pages.dev"

[observability]
enabled = true
