name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and publish to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://parliament-pulse.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_COMMIT_SHA: ${{ github.sha }}

      - name: Publish to Cloudflare Pages
        working-directory: workers/aph-proxy
        run: pnpm exec wrangler pages deploy ../../apps/web/dist --project-name=parliament-pulse --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
